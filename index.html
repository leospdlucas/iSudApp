<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="iSUD">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>iSUD - Apoio Missionário</title>
<style>
/* ===== CSS RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a237e;
  --primary-light: #3949ab;
  --accent: #f9a825;
  --bg: #f5f5f5;
  --surface: #ffffff;
  --text: #212121;
  --text-secondary: #757575;
  --success: #2e7d32;
  --danger: #c62828;
  --border: #e0e0e0;
  --weekend: #e8f5e9;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  /* Area colors */
  --area-0: #1565c0;
  --area-1: #2e7d32;
  --area-2: #e65100;
  --area-3: #6a1b9a;
  --area-4: #00838f;
  --area-5: #ad1457;
  --area-6: #4527a0;
  /* Theme-aware input background */
  --input-bg: #ffffff;
  --row-alt: #fafafa;
  --weekend-bg: #e8f5e9;
  --tag-bg: #f0f0f0;
}
[data-theme="dark"] {
  --primary: #5c6bc0;
  --primary-light: #7986cb;
  --accent: #ffb300;
  --bg: #121212;
  --surface: #1e1e1e;
  --text: #e0e0e0;
  --text-secondary: #9e9e9e;
  --success: #66bb6a;
  --danger: #ef5350;
  --border: #333333;
  --weekend: #1b2e1c;
  --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.5);
  --input-bg: #2a2a2a;
  --row-alt: #242424;
  --weekend-bg: #1b2e1c;
  --tag-bg: #2a2a2a;
  /* Brighter area colors for dark mode contrast */
  --area-0: #42a5f5;
  --area-1: #66bb6a;
  --area-2: #ffa726;
  --area-3: #ab47bc;
  --area-4: #26c6da;
  --area-5: #ec407a;
  --area-6: #7e57c2;
}
html { color-scheme: light dark; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
button { cursor: pointer; font-family: var(--font); }
input, select, textarea { font-family: var(--font); font-size: 14px; }

/* ===== LAYOUT SHELL ===== */
.app-header {
  background: var(--primary);
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.app-header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.header-btn {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  padding: 6px;
  border-radius: var(--radius-sm);
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.15); }
.header-btn.active { background: rgba(255,255,255,0.25); }

/* ===== TAB NAVIGATION ===== */
.tab-nav {
  display: flex;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-snap-type: x mandatory;
  position: sticky;
  top: 46px;
  z-index: 90;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: 90px;
  scroll-snap-align: start;
  padding: 10px 8px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 600;
}
.tab-btn:hover { color: var(--primary-light); }

/* ===== MAIN CONTENT ===== */
.app-main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
  min-height: calc(100vh - 110px);
}

/* ===== CARDS ===== */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-accent { background: var(--accent); color: #1a1a1a; }
.btn-accent:hover { opacity: 0.9; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.9; }
.btn-outline {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-block { width: 100%; justify-content: center; }

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #1a1a1a;
  border: none;
  font-size: 28px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: transform 0.2s;
}
.fab:hover { transform: scale(1.1); }

/* ===== FORMS ===== */
.form-group { margin-bottom: 12px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-control {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  transition: border-color 0.2s;
  background: var(--input-bg);
  color: var(--text);
}
.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(26,35,126,0.15);
}
textarea.form-control { resize: vertical; min-height: 60px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 16px;
  animation: fadeIn 0.2s;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s;
}
.modal-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 { font-size: 16px; }
.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  color: var(--text-secondary);
  padding: 4px;
}
.modal-body { padding: 16px; }
.modal-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.toolbar select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--input-bg);
  color: var(--text);
}
.segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.segmented button {
  padding: 6px 14px;
  border: none;
  background: var(--input-bg);
  font-size: 13px;
  color: var(--text-secondary);
  border-right: 1px solid var(--border);
}
.segmented button:last-child { border-right: none; }
.segmented button.active {
  background: var(--primary);
  color: white;
}

/* ===== CALENDAR MODULE ===== */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}
.month-nav h2 { font-size: 18px; min-width: 180px; text-align: center; }
.month-nav button {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 18px;
  color: var(--text);
}
.weekend-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.weekend-card-header {
  padding: 10px 16px;
  font-weight: 600;
  font-size: 14px;
  color: white;
  background: var(--primary);
}
.weekend-card-header.sabado { background: var(--primary-light); }
.weekend-card-header.domingo { background: var(--primary); }
.weekend-card-body { padding: 12px 16px; }
.dupla-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--bg);
}
.dupla-row:last-child { border-bottom: none; }
.dupla-label {
  font-size: 12px;
  font-weight: 600;
  min-width: 100px;
  padding: 2px 8px;
  border-radius: 10px;
  color: white;
  text-align: center;
}
.dupla-select {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--input-bg);
  color: var(--text);
}

/* ===== VOLUNTARIOS LIST ===== */
.vol-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.vol-info h4 { font-size: 14px; margin-bottom: 2px; }
.vol-info p { font-size: 12px; color: var(--text-secondary); }
.vol-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--tag-bg);
  color: var(--text-secondary);
  font-weight: 500;
}
.tag.active-tag { background: var(--tag-bg); color: var(--primary); border: 1px solid var(--primary); }

/* ===== DISPONIBILIDADE MODULE ===== */
.avail-grid {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.avail-grid table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.avail-grid th, .avail-grid td {
  padding: 6px 4px;
  text-align: center;
  border: 1px solid var(--border);
}
.avail-grid th {
  background: var(--primary);
  color: white;
  font-weight: 500;
  font-size: 11px;
}
.avail-grid td.type-label {
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  background: var(--bg);
  width: 70px;
  text-align: left;
  padding-left: 6px;
}
.avail-grid .cb {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--primary);
}
.avail-member-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.avail-member-header {
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg);
  cursor: pointer;
}
.avail-member-header h4 { font-size: 14px; }
.avail-member-body { padding: 8px; }

/* ===== RETENCAO MODULE ===== */
.retencao-table {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 4px;
  margin-bottom: 12px;
  max-width: 100vw;
}
.retencao-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.retencao-table th, .retencao-table td {
  padding: 6px 4px;
  text-align: center;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.retencao-table th {
  background: var(--primary);
  color: white;
  font-size: 10px;
  font-weight: 500;
  position: sticky;
  top: 0;
  z-index: 1;
}
.retencao-table th.group-header {
  background: var(--primary-light);
  font-size: 11px;
}
.retencao-table td {
  background: var(--surface);
  color: var(--text);
}
.retencao-table tr:nth-child(even) td { background: var(--row-alt); }
.retencao-table td:first-child {
  text-align: left;
  font-weight: 500;
  white-space: normal;
  min-width: 140px;
  position: sticky;
  left: 0;
  background: var(--surface) !important;
  z-index: 1;
}
.retencao-table tr:nth-child(even) td:first-child { background: var(--row-alt) !important; }
.retencao-table .cb {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--success);
}
.retencao-progress-cell {
  min-width: 80px;
}
.retencao-progress-cell .progress-bar { margin-top: 2px; }
.retencao-section-heading {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin: 12px 0 8px;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.progress-bar-fill {
  height: 100%;
  background: var(--success);
  border-radius: 3px;
  transition: width 0.3s;
}
.retencao-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px 16px;
  margin-bottom: 8px;
}
.retencao-card h4 { font-size: 14px; margin-bottom: 4px; }
.retencao-card .section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 8px;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.marco-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  font-size: 13px;
}
.marco-item.done { color: var(--success); }
.marco-item.done span { text-decoration: line-through; opacity: 0.8; }

/* ===== CONFIG MODULE ===== */
.config-area-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  background: var(--surface);
}
.config-area-color {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
}
.config-area-name { flex: 1; font-weight: 500; }
.config-area-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--border);
  color: var(--text-secondary);
}
.config-area-badge.ativa { background: rgba(46,125,50,0.15); color: var(--success); }

/* ===== SEARCH BOX ===== */
.search-box {
  position: relative;
  margin-bottom: 12px;
}
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
}
.search-box::before {
  content: '🔍';
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 13px; }

/* ===== CHIPS (day tags) ===== */
.chip-group { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  transition: all 0.15s;
}
.chip.selected {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .app-header h1 { font-size: 15px; }
  .app-main { padding: 10px; }
  .tab-btn { font-size: 11px; padding: 8px 6px; min-width: 80px; }
  .dupla-row { flex-direction: column; align-items: stretch; }
  .dupla-label { min-width: unset; margin-bottom: 2px; }
  .retencao-table table { font-size: 11px; }
  .fab { width: 48px; height: 48px; font-size: 24px; bottom: 16px; right: 16px; }
  .header-btn { font-size: 18px; padding: 4px; }
  .toolbar { gap: 6px; }
  .modal { max-width: calc(100vw - 16px); }
}
@media (min-width: 641px) and (max-width: 1024px) {
  .app-main { padding: 20px; max-width: 900px; }
  .tab-btn { font-size: 13px; padding: 12px 10px; }
  .retencao-grid-layout { display: grid; grid-template-columns: 1fr; gap: 12px; }
}
@media (min-width: 1025px) {
  .app-main { padding: 24px; }
  .tab-btn { font-size: 14px; padding: 14px 12px; }
  .retencao-card-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 300;
  animation: fadeIn 0.2s;
  box-shadow: var(--shadow-lg);
}
[data-theme="dark"] .toast { background: #424242; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ===== CORRELACAO MODULE ===== */
.corr-heading { font-size: 18px; font-weight: 600; margin: 12px 0 8px; color: var(--text); }
.corr-subheading { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin: 8px 0; }
.corr-quote {
  background: var(--weekend-bg);
  border-left: 3px solid var(--primary);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text);
  margin-bottom: 12px;
  font-style: italic;
}
.corr-participante-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.corr-participante-row:last-child { border-bottom: none; }
.corr-participante-cargo {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  min-width: 110px;
  flex-shrink: 0;
}
.corr-participante-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--input-bg);
  color: var(--text);
  min-width: 0;
}
.corr-participante-check {
  width: 22px;
  height: 22px;
  accent-color: var(--success);
  cursor: pointer;
  flex-shrink: 0;
}
.corr-pillar-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 768px) {
  .corr-pillar-grid { grid-template-columns: repeat(2, 1fr); }
}
.corr-pillar {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  border-top: 4px solid var(--primary);
}
.corr-pillar h4 { font-size: 14px; margin-bottom: 6px; color: var(--primary); }
.corr-pillar .corr-pillar-desc {
  font-size: 12px;

function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function $(sel, ctx) { return (ctx || document).querySelector(sel); }
function $$(sel, ctx) { return [...(ctx || document).querySelectorAll(sel)]; }

function escHtml(str) {

  d.textContent = str;

}

async function hashPassword(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function showToast(msg, type = '') {

}

function getWeekendDays(year, month) {
  const days = [];
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(year, month, d).getDay();
    if (dow === 0 || dow === 6) {
      days.push({ day: d, dow, date: `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` });
    }
  }
  return days;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;

const State = {
  data: null,
  load() {
    try {
      const raw = localStorage.getItem('isud_data');
      if (raw) {
        this.data = JSON.parse(raw);
        this.migrate();
      } else {
        this.data = JSON.parse(JSON.stringify(DEFAULT_STATE));
      }
    } catch {
      this.data = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    // Ensure retention keys exist for all areas
    this.data.areas.forEach(a => {
      if (!this.data.menosAtivos[a.id]) this.data.menosAtivos[a.id] = [];
      if (!this.data.recemConversos[a.id]) this.data.recemConversos[a.id] = [];
    });
  },
  save() {
    localStorage.setItem('isud_data', JSON.stringify(this.data));
  },
  migrate() {
    const d = this.data;
    if (!d.version) d.version = 1;

    // v1 -> v2: Add Austin area + correlacao module + ensure volunteer capacity/dias exist
    if (d.version < 2) {
      // Add Austin if missing
      if (!d.areas.find(a => a.id === 'austin')) {
        d.areas.push({ id: 'austin', nome: 'Austin', ativo: true });
      }
      // Initialize correlacao if missing
      if (!d.correlacao) {
        d.correlacao = {
          reunioes: {},
          pessoasEnsinadas: [],
          planoAla: { metasBemVindos: '', metasCompartilhar: '', metasApoiar: '', metasProgresso: '' },
        };
      }
      // Ensure volunteers have diasDisponiveis / capacidade
      (d.almoco?.voluntarios || []).forEach(v => {
        if (!Array.isArray(v.diasDisponiveis) || v.diasDisponiveis.length === 0) v.diasDisponiveis = ['sab','dom'];
        if (typeof v.capacidade !== 'number' || v.capacidade < 1) v.capacidade = 1;
      });
      d.version = 2;
    }

    // Ensure correlacao substructure (safety for partial state)
    if (!d.correlacao) d.correlacao = { reunioes: {}, pessoasEnsinadas: [], planoAla: {} };
    if (!d.correlacao.reunioes) d.correlacao.reunioes = {};
    if (!Array.isArray(d.correlacao.pessoasEnsinadas)) d.correlacao.pessoasEnsinadas = [];

    const a = this.data.areas.find(a => a.id === areaId);

  }

async function requireAdmin() {
  if (isAdmin) return true;
  if (!State.data.adminHash) {
    // First time: set password
    return new Promise(resolve => {
      showModal('Criar Senha Admin', `
        <div class="form-group">

      `, async () => {
        const p1 = $('#pw1').value, p2 = $('#pw2').value;
        if (!p1 || p1.length < 3) { showToast('Senha deve ter ao menos 3 caracteres', 'error'); return false; }
        if (p1 !== p2) { showToast('Senhas não conferem', 'error'); return false; }
        State.data.adminHash = await hashPassword(p1);
        State.save();
        isAdmin = true;
        sessionStorage.setItem('isud_admin', 'true');
        updateAdminBtn();
        showToast('Senha definida com sucesso!', 'success');
        resolve(true);
        return true;
      }, () => resolve(false));
    });
  }
  // Prompt for password
  return new Promise(resolve => {
    showModal('Autenticação', `
      <div class="form-group">
        <label>Senha de administrador</label>
        <input type="password" id="pw-auth" class="form-control" placeholder="Senha" autofocus>
      </div>
    `, async () => {
      const pw = $('#pw-auth').value;
      const h = await hashPassword(pw);
      if (h === State.data.adminHash) {
        isAdmin = true;
        sessionStorage.setItem('isud_admin', 'true');
        updateAdminBtn();
        showToast('Autenticado!', 'success');
        resolve(true);
        return true;
      } else {
        showToast('Senha incorreta', 'error');
        return false;
      }
    }, () => resolve(false));
  });
}

function lockAdmin() {
  isAdmin = false;

}

// ===== MODAL SYSTEM =====
function showModal(title, bodyHtml, onConfirm, onCancel, confirmText = 'Salvar') {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${escHtml(title)}</h3>
        <button class="modal-close" data-action="close">&times;</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="cancel">Cancelar</button>
        <button class="btn btn-primary" data-action="confirm">${escHtml(confirmText)}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => { overlay.remove(); if (onCancel) onCancel(); };
  overlay.querySelector('[data-action="close"]').onclick = close;
  overlay.querySelector('[data-action="cancel"]').onclick = close;
  overlay.querySelector('[data-action="confirm"]').onclick = async () => {
    const result = await onConfirm();
    if (result !== false) overlay.remove();
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  // Focus first input
  setTimeout(() => { const inp = overlay.querySelector('input, select, textarea'); if (inp) inp.focus(); }, 50);
}

function showConfirm(title, msg, onConfirm) {
  showModal(title, `<p>${escHtml(msg)}</p>`, () => { onConfirm(); return true; }, null, 'Confirmar');
}

function closeModal() {
  const m = $('.modal-overlay');
  if (m) m.remove();
}

// ===== THEME =====
function getStoredTheme() {
  return localStorage.getItem('isud_theme') || (window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
function applyTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  // Update <meta name="theme-color">
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#121212' : '#1a237e');
}
function getThemeIcon() {
  return getStoredTheme() === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const next = getStoredTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('isud_theme', next);
  applyTheme(next);
  render();
}

  container.innerHTML = `

      <button onclick="prevMonth()">◀</button>
      <h2>${MESES[almocoMonth]} ${almocoYear}</h2>
      <button onclick="nextMonth()">▶</button>
    </div>
    ${weekends.length === 0 ? '<div class="empty-state"><p>Nenhum fim de semana neste mês</p></div>' : ''}
    ${weekends.map(w => {
      const dayName = w.dow === 0 ? 'Domingo' : 'Sábado';
      const cssClass = w.dow === 0 ? 'domingo' : 'sabado';
      const entry = cal[w.date] || {};
      return `
        <div class="weekend-card">
          <div class="weekend-card-header ${cssClass}">${dayName}, ${w.day} de ${MESES[almocoMonth]}</div>
          <div class="weekend-card-body">
            ${areas.map(a => {
              const val = entry[a.id] || '';
              return `
                <div class="dupla-row">
                  <span class="dupla-label" style="background:${State.getAreaColor(a.id)}">${escHtml(a.nome)}</span>
                  <select class="dupla-select" onchange="saveCalEntry('${w.date}','${a.id}',this.value)">
                    <option value="">-- selecionar --</option>
                    ${State.data.almoco.voluntarios.filter(v => v.ativo).map(v =>
                      `<option value="${escHtml(v.nome)}" ${val === v.nome ? 'selected' : ''}>${escHtml(v.nome)}</option>`
                    ).join('')}
                    <option value="__outro" ${val && !State.data.almoco.voluntarios.find(v => v.nome === val && v.ativo) ? 'selected' : ''}>Outro...</option>
                  </select>
                  ${val && !State.data.almoco.voluntarios.find(v => v.nome === val && v.ativo) && val !== '__outro' ?
                    `<input type="text" class="form-control" style="flex:1;max-width:140px" value="${escHtml(val)}" onchange="saveCalEntry('${w.date}','${a.id}',this.value)" placeholder="Nome">` : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;

  // Handle "Outro..." selection showing text input
  $$('.dupla-select', container).forEach(sel => {
    sel.addEventListener('change', function() {
      if (this.value === '__outro') {
        const date = this.closest('.weekend-card-body') ? null : null; // handled by inline handler
        // Re-render to show text input
        render();
      }
    });
  });
}

async function saveCalEntry(date, areaId, value) {
  if (value === '__outro') {
    // Show prompt for custom name
    showModal('Nome personalizado', `
      <div class="form-group">
        <label>Nome da família/pessoa</label>
        <input type="text" id="custom-name" class="form-control" placeholder="Ex: Família Silva">
      </div>
    `, () => {
      const name = $('#custom-name').value.trim();
      if (!name) { showToast('Digite um nome', 'error'); return false; }
      if (!State.data.almoco.calendario[date]) State.data.almoco.calendario[date] = {};
      State.data.almoco.calendario[date][areaId] = name;
      State.save();
      render();
      return true;
    });
    return;
  }
  if (!State.data.almoco.calendario[date]) State.data.almoco.calendario[date] = {};
  State.data.almoco.calendario[date][areaId] = value;
  State.save();
}

function prevMonth() {
  almocoMonth--;
  if (almocoMonth < 0) { almocoMonth = 11; almocoYear--; }
  render();
}
function nextMonth() {
  almocoMonth++;
  if (almocoMonth > 11) { almocoMonth = 0; almocoYear++; }
  render();
}

function voluntarioForm(vol) {
  const v = vol || { id: '', nome: '', telefone: '', endereco: '', diasDisponiveis: [], capacidade: 1, observacoes: '', ativo: true };
  return `
    <div class="form-group">
      <label>Nome da Família</label>
      <input type="text" id="v-nome" class="form-control" value="${escHtml(v.nome)}" placeholder="Ex: Família Silva">

    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="v-tel" class="form-control" value="${escHtml(v.telefone)}" placeholder="(21) 99999-9999">
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="v-end" class="form-control" value="${escHtml(v.endereco)}" placeholder="Rua, número - bairro">
    </div>

      <label>Dias Disponíveis</label>
      <div class="days-grid">
        ${DIAS_KEYS.map((d, i) => `

            <input type="checkbox" style="display:none" ${v.diasDisponiveis.includes(d) ? 'checked' : ''} onchange="this.parentElement.classList.toggle('selected')">

        `).join('')}

          Flex
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>Capacidade (duplas)</label>
      <select id="v-cap" class="form-control">
        ${[1,2,3,4,5].map(n => `<option value="${n}" ${v.capacidade === n ? 'selected' : ''}>${n} dupla${n > 1 ? 's' : ''}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="v-obs" class="form-control" placeholder="Notas adicionais...">${escHtml(v.observacoes)}</textarea>

    ${vol ? `

function getVoluntarioFormData(existingId) {
  const nome = $('#v-nome').value.trim();
  if (!nome) { showToast('Nome é obrigatório', 'error'); return null; }
  const dias = $$('.days-grid .chip.selected').map(c => c.dataset.day);
  return {
    id: existingId || uuid(),
    nome,
    telefone: $('#v-tel').value.trim(),
    endereco: $('#v-end').value.trim(),
    diasDisponiveis: dias,
    capacidade: parseInt($('#v-cap').value),
    observacoes: $('#v-obs').value.trim(),
    ativo: existingId ? ($('#v-ativo')?.checked ?? true) : true,
  };
}

async function addVoluntario() {
  if (!await requireAdmin()) return;
  showModal('Novo Voluntário', voluntarioForm(), () => {
    const v = getVoluntarioFormData();
    if (!v) return false;
    State.data.almoco.voluntarios.push(v);
    State.save();
    render();
    showToast('Voluntário adicionado!', 'success');
    return true;
  });
}

async function editVoluntario(id) {
  if (!await requireAdmin()) return;
  const vol = State.data.almoco.voluntarios.find(v => v.id === id);
  if (!vol) return;
  showModal('Editar Voluntário', voluntarioForm(vol) + `
    <hr style="margin:12px 0">
    <button class="btn btn-danger btn-sm btn-block" onclick="deleteVoluntario('${id}')">Excluir Voluntário</button>
  `, () => {
    const v = getVoluntarioFormData(id);
    if (!v) return false;
    const idx = State.data.almoco.voluntarios.findIndex(x => x.id === id);
    if (idx >= 0) State.data.almoco.voluntarios[idx] = v;
    State.save();
    render();
    showToast('Voluntário atualizado!', 'success');
    return true;
  });
}

function deleteVoluntario(id) {
  closeModal();
  showConfirm('Excluir Voluntário', 'Tem certeza que deseja excluir este voluntário?', () => {
    State.data.almoco.voluntarios = State.data.almoco.voluntarios.filter(v => v.id !== id);
    State.save();
    render();
    showToast('Voluntário excluído');
  });
}

let dispExpandedId = null;

function renderDisponibilidade(container) {

  container.innerHTML = `
    <div class="toolbar">
      <div class="search-box" style="flex:1;margin-bottom:0">
        <input type="text" id="disp-search" placeholder="Buscar membro..." oninput="filterDisp()">
      </div>
      <button class="btn btn-sm btn-accent" onclick="buscarDisponivel()">Buscar disponível</button>

    <div id="disp-list">
      ${membros.length === 0 ? `
        <div class="empty-state">
          <div class="icon">📖</div>
          <h3>Nenhum membro cadastrado</h3>
          <p>Toque no botão + para adicionar membros disponíveis para lições</p>
        </div>

    <button class="fab" onclick="addMembro()">+</button>

function renderDispMember(m) {
  const expanded = dispExpandedId === m.id;
  return `
    <div class="avail-member-card" data-name="${escHtml(m.nome.toLowerCase())}">
      <div class="avail-member-header" onclick="toggleDispMember('${m.id}')">
        <h4>${escHtml(m.nome)}</h4>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-secondary)">${escHtml(m.telefone || '')}</span>
          <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();editMembro('${m.id}')">Editar</button>
          <span>${expanded ? '▲' : '▼'}</span>
        </div>
      </div>
      ${expanded ? `
        <div class="avail-member-body">
          <div class="avail-grid">
            <table>
              <thead>
                <tr>
                  <th>Horário</th>
                  <th>Tipo</th>
                  ${DIAS_SEMANA.map(d => `<th>${d}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${HORARIOS.map(h => `
                  <tr>
                    <td rowspan="2" style="font-weight:600;font-size:11px;background:var(--bg)">${h}</td>
                    <td class="type-label" style="color:var(--primary)">Pres.</td>
                    ${DIAS_KEYS.map(d => {
                      const checked = (m.presencial[d] || []).includes(h);
                      return `<td><input type="checkbox" class="cb" ${checked ? 'checked' : ''} onchange="toggleDisp('${m.id}','presencial','${d}','${h}',this.checked)"></td>`;
                    }).join('')}
                  </tr>
                  <tr>
                    <td class="type-label" style="color:var(--success)">Vídeo</td>
                    ${DIAS_KEYS.map(d => {
                      const checked = (m.videochamada[d] || []).includes(h);
                      return `<td><input type="checkbox" class="cb" ${checked ? 'checked' : ''} onchange="toggleDisp('${m.id}','videochamada','${d}','${h}',this.checked)"></td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      ` : ''}
    </div>

}

function toggleDispMember(id) {
  dispExpandedId = dispExpandedId === id ? null : id;
  render();
}

async function toggleDisp(membroId, tipo, dia, horario, checked) {
  if (!isAdmin) {
    if (!await requireAdmin()) { render(); return; }
  }
  const m = State.data.disponibilidade.membros.find(x => x.id === membroId);
  if (!m) return;
  if (!m[tipo][dia]) m[tipo][dia] = [];
  if (checked) {
    if (!m[tipo][dia].includes(horario)) m[tipo][dia].push(horario);
  } else {
    m[tipo][dia] = m[tipo][dia].filter(h => h !== horario);
  }
  State.save();
}

function filterDisp() {
  const q = ($('#disp-search')?.value || '').toLowerCase();
  $$('.avail-member-card').forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? '' : 'none';
  });
}

function membroForm(m) {
  const mb = m || { nome: '', telefone: '' };
  return `
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="m-nome" class="form-control" value="${escHtml(mb.nome)}" placeholder="Nome completo">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="m-tel" class="form-control" value="${escHtml(mb.telefone)}" placeholder="(21) 99999-9999">
    </div>
  `;
}

async function addMembro() {
  if (!await requireAdmin()) return;
  showModal('Novo Membro', membroForm(), () => {
    const nome = $('#m-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    const pres = {}; const vid = {};
    DIAS_KEYS.forEach(d => { pres[d] = []; vid[d] = []; });
    State.data.disponibilidade.membros.push({
      id: uuid(), nome, telefone: $('#m-tel').value.trim(),
      presencial: pres, videochamada: vid,
    });
    State.save();
    render();
    showToast('Membro adicionado!', 'success');
    return true;
  });
}

async function editMembro(id) {
  if (!await requireAdmin()) return;
  const m = State.data.disponibilidade.membros.find(x => x.id === id);
  if (!m) return;
  showModal('Editar Membro', membroForm(m) + `
    <hr style="margin:12px 0">
    <button class="btn btn-danger btn-sm btn-block" onclick="deleteMembro('${id}')">Excluir Membro</button>
  `, () => {
    const nome = $('#m-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    m.nome = nome;
    m.telefone = $('#m-tel').value.trim();
    State.save();
    render();
    showToast('Membro atualizado!', 'success');
    return true;
  });
}

function deleteMembro(id) {
  closeModal();
  showConfirm('Excluir Membro', 'Tem certeza?', () => {
    State.data.disponibilidade.membros = State.data.disponibilidade.membros.filter(m => m.id !== id);
    State.save();
    render();
    showToast('Membro excluído');
  });
}

function buscarDisponivel() {
  showModal('Buscar Membro Disponível', `
    <div class="form-group">
      <label>Dia da Semana</label>
      <select id="b-dia" class="form-control">
        ${DIAS_KEYS.map((d, i) => `<option value="${d}">${DIAS_SEMANA[i]}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Horário</label>
      <select id="b-hora" class="form-control">
        ${HORARIOS.map(h => `<option value="${h}">${h}</option>`).join('')}
      </select>
    </div>
    <div id="b-results" style="margin-top:12px"></div>
  `, null, null, 'Fechar');

  // Replace confirm with search action
  const footer = $('.modal-footer');
  footer.innerHTML = `
    <button class="btn btn-primary" onclick="executeBusca()">Buscar</button>
    <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
  `;
}

function executeBusca() {
  const dia = $('#b-dia').value;
  const hora = $('#b-hora').value;
  const results = State.data.disponibilidade.membros.filter(m => {
    const pres = (m.presencial[dia] || []).includes(hora);
    const vid = (m.videochamada[dia] || []).includes(hora);
    return pres || vid;
  });
  const res = $('#b-results');
  if (results.length === 0) {
    res.innerHTML = '<p style="color:var(--text-secondary);text-align:center">Nenhum membro disponível neste horário</p>';
  } else {
    res.innerHTML = results.map(m => {
      const pres = (m.presencial[dia] || []).includes(hora);
      const vid = (m.videochamada[dia] || []).includes(hora);
      return `<div style="padding:8px;border-bottom:1px solid var(--border)">
        <strong>${escHtml(m.nome)}</strong> ${m.telefone ? '· ' + escHtml(m.telefone) : ''}
        <div style="margin-top:2px">
          ${pres ? '<span class="tag active-tag">Presencial</span>' : ''}
          ${vid ? '<span class="tag" style="background:#e8f5e9;color:var(--success)">Vídeo</span>' : ''}
        </div>
      </div>`;
    }).join('');
  }
}

// ===== MODULE: RETENCAO =====
let retencaoArea = {};

function renderRetencao(container, dataKey, title) {
  const areas = State.getActiveAreas();
  if (!retencaoArea[dataKey] && areas.length > 0) retencaoArea[dataKey] = areas[0].id;
  const selectedArea = retencaoArea[dataKey];
  const pessoas = (State.data[dataKey][selectedArea] || []);
  const isConversos = dataKey === 'recemConversos';
  const isDesktop = window.innerWidth > 640;

  container.innerHTML = `
    <h2 class="retencao-section-heading">${escHtml(title)}</h2>
    <div class="toolbar">
      <select onchange="retencaoArea['${dataKey}']=this.value;render()">
        ${areas.map(a => `<option value="${a.id}" ${a.id === selectedArea ? 'selected' : ''}>${escHtml(a.nome)}</option>`).join('')}
      </select>
      <span style="font-size:13px;color:var(--text-secondary)">${pessoas.length} pessoa${pessoas.length !== 1 ? 's' : ''}</span>
    </div>
    <div id="retencao-content">
      ${pessoas.length === 0 ? `
        <div class="empty-state">
          <div class="icon">${isConversos ? '✨' : '🔄'}</div>
          <h3>Nenhuma pessoa cadastrada</h3>
          <p>Toque no botão + para adicionar</p>
        </div>
      ` : (isDesktop ? renderRetencaoGrid(pessoas, dataKey, isConversos) : renderRetencaoCards(pessoas, dataKey, isConversos))}
    </div>
    <button class="fab" onclick="addPessoaRetencao('${dataKey}')">+</button>
  `;
}

function renderRetencaoGrid(pessoas, dataKey, isConversos) {
  const total = ALL_MARCOS_KEYS.length;
  return `
    <div class="retencao-table">
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="text-align:left;padding-left:8px">Nome</th>
            ${MARCOS_CONFIG.map(g => `<th colspan="${g.items.length}" class="group-header">${escHtml(g.group)}</th>`).join('')}
            <th rowspan="2" class="retencao-progress-cell">Progresso</th>
            <th rowspan="2">Ações</th>
          </tr>
          <tr>
            ${MARCOS_CONFIG.flatMap(g => g.items).map(i => `<th title="${escHtml(i.label)}">${escHtml(i.abbr)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${pessoas.map(p => {
            const done = ALL_MARCOS_KEYS.filter(k => p.marcos[k]).length;
            const pct = Math.round((done / total) * 100);
            return `
              <tr>
                <td>
                  <div style="font-weight:600">${escHtml(p.nome)}</div>
                  ${isConversos && p.dataBatismo ? `<div style="font-size:10px;color:var(--text-secondary)">Bat: ${formatDate(p.dataBatismo)}</div>` : ''}
                </td>
                ${MARCOS_CONFIG.flatMap(g => g.items).map(item => {
                  const val = p.marcos[item.key];
                  return `<td title="${val ? formatDate(val) : escHtml(item.label)}">
                    <input type="checkbox" class="cb" ${val ? 'checked' : ''} onchange="toggleMarco('${dataKey}','${p.id}','${item.key}',this.checked)">
                  </td>`;
                }).join('')}
                <td class="retencao-progress-cell">
                  <div style="font-size:11px;font-weight:600;color:${pct === 100 ? 'var(--success)' : 'var(--text-secondary)'}">${pct}%</div>
                  <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                </td>
                <td>
                  <button class="btn btn-sm btn-outline" onclick="editPessoaRetencao('${dataKey}','${p.id}')">✏️</button>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderRetencaoCards(pessoas, dataKey, isConversos) {
  return pessoas.map(p => {
    const total = ALL_MARCOS_KEYS.length;
    const done = ALL_MARCOS_KEYS.filter(k => p.marcos[k]).length;
    const pct = Math.round((done / total) * 100);
    return `
      <div class="retencao-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h4>${escHtml(p.nome)}</h4>
            ${isConversos && p.dataBatismo ? `<p style="font-size:11px;color:var(--text-secondary)">Batismo: ${formatDate(p.dataBatismo)}</p>` : ''}
          </div>
          <button class="btn btn-sm btn-outline" onclick="editPessoaRetencao('${dataKey}','${p.id}')">Editar</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin:6px 0">
          <div class="progress-bar" style="flex:1">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:${pct === 100 ? 'var(--success)' : 'var(--text-secondary)'}">${pct}%</span>
        </div>
        ${MARCOS_CONFIG.map(g => `
          <div class="section-title">${g.group}</div>
          ${g.items.map(item => {
            const val = p.marcos[item.key];
            return `
              <div class="marco-item ${val ? 'done' : ''}">
                <input type="checkbox" class="cb" ${val ? 'checked' : ''} onchange="toggleMarco('${dataKey}','${p.id}','${item.key}',this.checked)">
                <span>${escHtml(item.label)}</span>
                ${val ? `<span style="font-size:10px;color:var(--text-secondary);margin-left:auto">${formatDate(val)}</span>` : ''}
              </div>
            `;
          }).join('')}
        `).join('')}
      </div>
    `;
  }).join('');
}

async function toggleMarco(dataKey, pessoaId, marcoKey, checked) {
  if (!isAdmin) {
    if (!await requireAdmin()) { render(); return; }
  }
  const area = retencaoArea[dataKey];
  const p = (State.data[dataKey][area] || []).find(x => x.id === pessoaId);
  if (!p) return;
  if (checked) {
    const today = new Date();
    p.marcos[marcoKey] = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  } else {
    p.marcos[marcoKey] = null;
  }
  State.save();
  render();
}

function pessoaRetencaoForm(p, isConversos) {
  const pessoa = p || { nome: '', dataBatismo: '' };
  return `
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="p-nome" class="form-control" value="${escHtml(pessoa.nome)}" placeholder="Nome completo">
    </div>
    ${isConversos ? `
      <div class="form-group">
        <label>Data do Batismo</label>
        <input type="date" id="p-batismo" class="form-control" value="${pessoa.dataBatismo || ''}">
      </div>
    ` : ''}
  `;
}

async function addPessoaRetencao(dataKey) {
  if (!await requireAdmin()) return;
  const area = retencaoArea[dataKey];
  const isConversos = dataKey === 'recemConversos';
  showModal('Nova Pessoa', pessoaRetencaoForm(null, isConversos), () => {
    const nome = $('#p-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    const marcos = {};
    ALL_MARCOS_KEYS.forEach(k => marcos[k] = null);
    const pessoa = { id: uuid(), nome, marcos };
    if (isConversos) pessoa.dataBatismo = $('#p-batismo')?.value || '';
    if (!State.data[dataKey][area]) State.data[dataKey][area] = [];
    State.data[dataKey][area].push(pessoa);
    State.save();
    render();
    showToast('Pessoa adicionada!', 'success');
    return true;
  });
}

async function editPessoaRetencao(dataKey, pessoaId) {
  if (!await requireAdmin()) return;
  const area = retencaoArea[dataKey];
  const isConversos = dataKey === 'recemConversos';
  const p = (State.data[dataKey][area] || []).find(x => x.id === pessoaId);
  if (!p) return;
  showModal('Editar Pessoa', pessoaRetencaoForm(p, isConversos) + `
    <hr style="margin:12px 0">
    <button class="btn btn-danger btn-sm btn-block" onclick="deletePessoaRetencao('${dataKey}','${pessoaId}')">Excluir Pessoa</button>
  `, () => {
    const nome = $('#p-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    p.nome = nome;
    if (isConversos) p.dataBatismo = $('#p-batismo')?.value || '';
    State.save();
    render();
    showToast('Pessoa atualizada!', 'success');
    return true;
  });
}

function deletePessoaRetencao(dataKey, pessoaId) {
  closeModal();
  const area = retencaoArea[dataKey];
  showConfirm('Excluir Pessoa', 'Tem certeza?', () => {
    State.data[dataKey][area] = (State.data[dataKey][area] || []).filter(p => p.id !== pessoaId);
    State.save();
    render();
    showToast('Pessoa excluída');
  });
}

// --- Sub-view 1: Reunião ---
function renderCorrelacaoReuniao(container) {
  const reunioes = State.data.correlacao.reunioes;
  const datasOrdenadas = Object.keys(reunioes).sort().reverse();
  if (!correlacaoReuniaoData) {
    correlacaoReuniaoData = datasOrdenadas[0] || new Date().toISOString().slice(0,10);
  }
  const reuniao = reunioes[correlacaoReuniaoData] || {
    data: correlacaoReuniaoData,
    participantes: CARGOS_CORRELACAO.map(c => ({ cargo: c.key, cargoLabel: c.label, nome: '', presente: false })),
    notas: '',
  };

  container.innerHTML = `
    <div class="corr-reuniao-card">
      <div class="form-group">
        <label>Data da Reunião</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="date" class="form-control" style="flex:1;min-width:160px" value="${correlacaoReuniaoData}" onchange="changeReuniaoData(this.value)">
          ${datasOrdenadas.length > 0 ? `
            <select class="form-control" style="flex:1;min-width:160px" onchange="loadReuniao(this.value)">
              <option value="">— Reuniões anteriores —</option>
              ${datasOrdenadas.map(d => `<option value="${d}" ${d === correlacaoReuniaoData ? 'selected' : ''}>${formatDate(d)}</option>`).join('')}
            </select>
          ` : ''}
          <button class="btn btn-sm btn-accent" onclick="saveReuniao()">💾 Salvar</button>
        </div>
      </div>

      <h4 class="corr-subheading">Participantes</h4>
      <div id="corr-participantes">
        ${reuniao.participantes.map((p, i) => `
          <div class="corr-participante-row">
            <span class="corr-participante-cargo">${escHtml(p.cargoLabel || CARGOS_CORRELACAO.find(c => c.key === p.cargo)?.label || p.cargo)}</span>
            <input type="text" class="corr-participante-input" placeholder="Nome do líder"
              value="${escHtml(p.nome || '')}" data-idx="${i}" onchange="updateParticipanteNome(${i}, this.value)">
            <input type="checkbox" class="corr-participante-check" ${p.presente ? 'checked' : ''}
              onchange="updateParticipantePresente(${i}, this.checked)" title="Presente">
          </div>
        `).join('')}
      </div>

      <h4 class="corr-subheading" style="margin-top:16px">Perguntas Orientadoras (Manual 23.4.1)</h4>
      <ul style="font-size:12px;color:var(--text-secondary);margin-left:18px;margin-bottom:12px;line-height:1.6">
        <li>Quem está progredindo rumo ao batismo e confirmação?</li>
        <li>Quem está sendo ensinado mas não progride?</li>
        <li>Como podemos encontrar e ensinar mais pessoas como ala?</li>
      </ul>

      <div class="form-group">
        <label>Notas da Reunião</label>
        <textarea class="form-control" rows="5" id="corr-notas"
          placeholder="Decisões, designações e observações desta reunião..."
          onchange="updateReuniaoNotas(this.value)">${escHtml(reuniao.notas || '')}</textarea>
      </div>
    </div>
  `;

  // Ensure the reunion object exists in state for editing in place
  if (!reunioes[correlacaoReuniaoData]) {
    State.data.correlacao.reunioes[correlacaoReuniaoData] = JSON.parse(JSON.stringify(reuniao));
  }
}

function changeReuniaoData(newDate) {
  if (!newDate) return;
  const reunioes = State.data.correlacao.reunioes;
  const old = correlacaoReuniaoData;
  // If there's an existing entry for old date, move/rename it to new date (only if user wants to change date of unsaved)
  if (reunioes[old] && !reunioes[newDate]) {
    reunioes[newDate] = { ...reunioes[old], data: newDate };
    if (old !== newDate) delete reunioes[old];
  }
  correlacaoReuniaoData = newDate;
  State.save();
  render();
}

function loadReuniao(date) {
  if (!date) return;
  correlacaoReuniaoData = date;
  render();
}

async function saveReuniao() {
  if (!isAdmin) {
    if (!await requireAdmin()) return;
  }
  State.save();
  showToast('Reunião salva!', 'success');
}

function updateParticipanteNome(idx, value) {
  const r = State.data.correlacao.reunioes[correlacaoReuniaoData];
  if (!r) return;
  r.participantes[idx].nome = value;
  State.save();
}

function updateParticipantePresente(idx, checked) {
  const r = State.data.correlacao.reunioes[correlacaoReuniaoData];
  if (!r) return;
  r.participantes[idx].presente = checked;
  State.save();
}

function updateReuniaoNotas(value) {
  const r = State.data.correlacao.reunioes[correlacaoReuniaoData];
  if (!r) return;
  r.notas = value;
  State.save();
}

async function editCorrelacaoPessoa(id) {
  if (!await requireAdmin()) return;

  showModal('Editar Pessoa', pessoaCorrelacaoForm(p) + `

    render();
    showToast('Pessoa atualizada!', 'success');
    return true;
  });

function deleteCorrelacaoPessoa(id) {

async function addArea() {
  closeModal();
  if (!await requireAdmin()) { showConfig(); return; }
  showModal('Nova Área', `
    <div class="form-group">
      <label>Nome da Área</label>
      <input type="text" id="a-nome" class="form-control" placeholder="Ex: Nova Iguaçu">
    </div>
  `, () => {
    const nome = $('#a-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    const id = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');
    if (State.data.areas.find(a => a.id === id)) { showToast('Área já existe', 'error'); return false; }
    State.data.areas.push({ id, nome, ativo: true });
    State.data.menosAtivos[id] = [];
    State.data.recemConversos[id] = [];
    State.save();
    showConfig();
    showToast('Área adicionada!', 'success');
    return true;
  });
}

async function editArea(areaId) {
  closeModal();
  if (!await requireAdmin()) { showConfig(); return; }
  const area = State.data.areas.find(a => a.id === areaId);
  if (!area) return;
  showModal('Editar Área', `
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="ea-nome" class="form-control" value="${escHtml(area.nome)}">
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="ea-ativo" ${area.ativo ? 'checked' : ''}> Ativa</label>
    </div>
    <hr style="margin:12px 0">
    <button class="btn btn-danger btn-sm btn-block" onclick="deleteArea('${areaId}')">Excluir Área</button>
  `, () => {
    const nome = $('#ea-nome').value.trim();
    if (!nome) { showToast('Nome é obrigatório', 'error'); return false; }
    area.nome = nome;
    area.ativo = $('#ea-ativo').checked;
    State.save();
    showConfig();
    showToast('Área atualizada!', 'success');
    return true;
  });
}

function deleteArea(areaId) {
  closeModal();
  showConfirm('Excluir Área', 'Todos os dados desta área serão perdidos. Continuar?', () => {
    State.data.areas = State.data.areas.filter(a => a.id !== areaId);
    delete State.data.menosAtivos[areaId];
    delete State.data.recemConversos[areaId];
    // Clean calendar entries for this area
    Object.values(State.data.almoco.calendario).forEach(day => { delete day[areaId]; });
    State.save();
    showConfig();
    showToast('Área excluída');
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `isud-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Dados exportados!', 'success');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !data.areas) { showToast('Arquivo inválido', 'error'); return; }
        State.data = data;
        State.save();
        render();
        showToast('Dados importados com sucesso!', 'success');
        closeModal();
      } catch {
        showToast('Erro ao ler arquivo', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function resetPassword() {
  closeModal();
  showModal('Redefinir Senha', `
    <div class="form-group">
      <label>Senha atual</label>
      <input type="password" id="rp-old" class="form-control">
    </div>
    <div class="form-group">
      <label>Nova senha</label>
      <input type="password" id="rp-new" class="form-control">
    </div>
    <div class="form-group">
      <label>Confirmar nova senha</label>
      <input type="password" id="rp-confirm" class="form-control">
    </div>
  `, async () => {
    const oldH = await hashPassword($('#rp-old').value);
    if (oldH !== State.data.adminHash) { showToast('Senha atual incorreta', 'error'); return false; }
    const n1 = $('#rp-new').value, n2 = $('#rp-confirm').value;
    if (!n1 || n1.length < 3) { showToast('Senha deve ter ao menos 3 caracteres', 'error'); return false; }
    if (n1 !== n2) { showToast('Senhas não conferem', 'error'); return false; }
    State.data.adminHash = await hashPassword(n1);
    State.save();
    showToast('Senha redefinida!', 'success');
    showConfig();
    return true;
  });
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}

// ===== PWA INSTALL PROMPT =====
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

// ===== RESIZE HANDLER =====
let _resizeTimer = null;
let _lastIsDesktop = window.innerWidth > 640;
window.addEventListener('resize', () => {
  const isDesktop = window.innerWidth > 640;
  if (isDesktop !== _lastIsDesktop) {
    _lastIsDesktop = isDesktop;
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => render(), 150);
  }
});

// ===== INIT =====
applyTheme(getStoredTheme());
State.load();
render();
</script>
